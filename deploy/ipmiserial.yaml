# ipmiserial - IPMI Serial-over-LAN console server
# Deploy via mkube API:
#   curl -X POST http://192.168.200.2:8082/api/v1/namespaces/g11/pods \
#     -H "Content-Type: application/json" -d @deploy/ipmiserial.json

apiVersion: v1
kind: Pod
metadata:
  name: ipmiserial
  namespace: g11
  annotations:
    vkube.io/network: g11
    vkube.io/static-ip: "192.168.11.200"
    vkube.io/boot-priority: "70"
    vkube.io/depends-on: "g11_dns_microdns"
    vkube.io/image-policy: auto
    vkube.io/aliases: "ipmiserial"
spec:
  restartPolicy: Always
  volumes:
    - name: config
      configMap:
        name: ipmiserial-config
    - name: data
      persistentVolumeClaim:
        claimName: g11-ipmiserial-data
  containers:
    - name: ipmiserial
      image: registry.gt.lo:5000/ipmiserial:edge
      ports:
        - containerPort: 8080
          protocol: TCP
      livenessProbe:
        httpGet:
          path: /
          port: 8080
        periodSeconds: 30
        failureThreshold: 3
      volumeMounts:
        - name: config
          mountPath: /etc/ipmiserial
        - name: data
          mountPath: /var/lib/data
